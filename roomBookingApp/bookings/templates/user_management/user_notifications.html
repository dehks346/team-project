{% extends 'base.html' %}
{% block title %}Notifications{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <h2 style="margin-bottom: 25px;">Notifications</h2>

    {% for notification in notifications %}
    <div style="padding: 16px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 12px;">
        <p>{{ notification.message }}</p>
        <small style="color: var(--text-dim);">{{ notification.created_at|timesince }} ago</small>
    </div>
    {% empty %}
    <p style="color: var(--text-dim); text-align: center; padding: 60px;">No notifications yet.</p>
    {% endfor %}
</div>
{% endblock %}
