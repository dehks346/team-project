{% extends 'base.html' %}
{% block title %}User Management{% endblock %}
{% block content %}
<div class="card">
    <h2>User Management</h2>
    <input type="text" placeholder="Search users">
    <table>
        <thead><tr><th>Name</th><th>Role</th><th>Actions</th></tr></thead>
        <tbody>
            {% for user in users %}
            <tr><td>{{ user.username }}</td><td>{{ user.role }}</td><td><a class="btn btn-outline">Edit</a></td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
