{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="card">
    <h2>Register</h2>
    <form method="post">
        {% csrf_token %}
        <label>Name</label><input type="text" name="name">
        <label>Email</label><input type="email" name="email">
        <label>Password</label><input type="password" name="password1">
        <label>Confirm Password</label><input type="password" name="password2">
        <label>Role</label><select name="role"><option>User</option><option>Admin</option></select>
        <label><input type="checkbox" name="terms"> Accept terms</label>
        <button class="btn btn-primary">Register</button>
    </form>
</div>
{% endblock %}
