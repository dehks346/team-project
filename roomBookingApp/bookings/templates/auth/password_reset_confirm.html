{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="card">
    <h2>Set New Password</h2>
    <form method="post">
        {% csrf_token %}
        <label>New Password</label><input type="password" name="new_password1">
        <label>Confirm</label><input type="password" name="new_password2">
        <button class="btn btn-primary">Reset</button>
    </form>
</div>
{% endblock %}
