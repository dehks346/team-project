{% extends 'base.html' %}
{% block title %}Password Reset{% endblock %}
{% block content %}
<div class="card">
    <h2>Password Reset</h2>
    <form method="post">
        {% csrf_token %}
        <label>Email</label><input type="email" name="email">
        <button class="btn btn-primary">Send Reset Link</button>
    </form>
</div>
{% endblock %}
