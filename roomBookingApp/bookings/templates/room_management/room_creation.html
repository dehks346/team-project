{% extends 'base.html' %}
{% block title %}Create Room{% endblock %}
{% block content %}
<div class="card">
    <h2>Create Room</h2>
    <form method="post">
        {% csrf_token %}
        <label>Name</label><input type="text">
        <label>Capacity</label><input type="number">
        <button class="btn btn-primary">Create</button>
    </form>
</div>
{% endblock %}
